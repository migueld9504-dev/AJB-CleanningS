<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJB Gallery Manager v2</title>
    <style>
        :root {
            --navy: #0a1128;
            --gold: #d4af37;
            --white: #ffffff;
            --gray: #f4f4f4;
            --red: #e74c3c;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--navy);
            color: var(--white);
            margin: 0;
            padding: 20px;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 { color: var(--gold); }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }
        .item-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            transition: transform 0.2s;
        }
        .item-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
        }
        .img-preview {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .field-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 0.8rem;
            color: var(--gold);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        input, textarea {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 8px;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .lang-split {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .actions {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        button {
            cursor: pointer;
            padding: 10px 15px;
            border-radius: 5px;
            border: none;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        .btn-delete { background-color: var(--red); color: white; }
        .btn-save { background-color: var(--gold); color: var(--navy); }
        button:hover { opacity: 0.8; }
        
        #outputArea {
            margin-top: 50px;
            background: #000;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }
        pre { white-space: pre-wrap; word-wrap: break-word; color: #0f0; }
    </style>
</head>

    function render() {
        const grid = document.getElementById('managerGrid');
        grid.innerHTML = '';
        galleryData.forEach((item, index) => {
            if (item._deleted) return;
            const card = document.createElement('div');
            card.className = 'item-card';
            card.innerHTML = `
                <img src="${item.img}" class="img-preview" alt="Preview">
                <div style="font-size: 0.7rem; color: #888; margin-bottom: 10px;">ID: ${item.id} | FILE: ${item.img}</div>
                
                <div class="field-group">
                    <label>Title</label>
                    <div class="lang-split">
                        <input type="text" placeholder="English" value="${item.title_en}" onchange="update(${index}, 'title_en', this.value)">
                        <input type="text" placeholder="Spanish" value="${item.title_es}" onchange="update(${index}, 'title_es', this.value)">
                    </div>
                </div>

                <div class="field-group">
                    <label>Description</label>
                    <div class="lang-split">
                        <textarea rows="3" placeholder="English" onchange="update(${index}, 'desc_en', this.value)">${item.desc_en}</textarea>
                        <textarea rows="3" placeholder="Spanish" onchange="update(${index}, 'desc_es', this.value)">${item.desc_es}</textarea>
                    </div>
                </div>

                <div class="actions">
                    <button class="btn-delete" onclick="markDeleted(${index})">Delete Item</button>
                    <div style="color: var(--gold); font-size: 0.8rem;">Category: ${item.cat}</div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function update(index, field, value) {
        galleryData[index][field] = value;
    }

    function markDeleted(index) {
        if (confirm('Are you sure you want to delete this item?')) {
            galleryData[index]._deleted = true;
            render();
        }
    }

    function generateUpdate() {
        const outputArea = document.getElementById('outputArea');
        const outputCode = document.getElementById('outputCode');
        
        const activeItems = galleryData.filter(i => !i._deleted);
        const deletedItems = galleryData.filter(i => i._deleted);
        
        const report = {
            updates: activeItems,
            deletions: deletedItems.map(i => i.id)
        };
        
        outputCode.textContent = JSON.stringify(report, null, 2);
        outputArea.style.display = 'block';
        outputArea.scrollIntoView({ behavior: 'smooth' });
    }

    render();
</script>
